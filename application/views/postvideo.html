    <main>
        <section>
            <h2>Post a Video</h2>
            <form action="postvideo.php" method="post" enctype="multipart/form-data">
                <label for="title">Title:</label>
                <input type="text" id="title" name="title" required><br><br>
                <label for="description">Description:</label>
                <textarea id="description" name="description" required></textarea><br><br>
                <label for="video">Video File:</label>
                <input type="file" id="video" name="video" accept=".mp4,.avi,.mov" required><br><br>
                <input type="checkbox" id="Acceptable use policy" name="Acceptable use policy" required>
                <label for="terms">
                   I agree to the Acceptable Use Policy
                </label><br><br>
                <input type="submit" value="Post Video">
            </form>
        </section>
